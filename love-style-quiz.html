<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>测测你的恋爱风格 | 趣味测试</title>
    <style>
        :root {
            --color-primary: #000;
            --color-text: #111;
            --color-accent: #4ade80;
            --color-bg: #000;
            --color-card: #111;
            --color-border: #222;
            --color-white: #fff;
            --color-gray-light: #666;
            
            --font-size-h2: 24px;
            --font-size-card-title: 15px;
            --font-size-small: 12px;
            --font-weight-bold: 600;
            
            --max-width-mobile: 420px;
            --spacing-md: 12px;
            --spacing-lg: 16px;
            --radius-md: 12px;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            background: var(--color-bg);
            color: var(--color-white);
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
            min-height: 100vh;
            padding: var(--spacing-lg);
        }
        
        .container {
            max-width: var(--max-width-mobile);
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            margin-bottom: 32px;
            animation: slideUp 0.6s ease;
        }
        
        .header h1 {
            font-size: var(--font-size-h2);
            font-weight: var(--font-weight-bold);
            margin-bottom: 8px;
            color: var(--color-white);
        }
        
        .header p {
            font-size: var(--font-size-small);
            color: var(--color-gray-light);
        }
        
        .progress-bar {
            background: var(--color-card);
            height: 4px;
            border-radius: 9999px;
            margin-bottom: 24px;
            overflow: hidden;
            animation: slideUp 0.6s ease 0.1s backwards;
        }
        
        .progress-fill {
            height: 100%;
            background: var(--color-accent);
            transition: width 0.3s ease;
        }
        
        .question-card {
            background: var(--color-card);
            border-radius: var(--radius-md);
            padding: var(--spacing-lg);
            margin-bottom: var(--spacing-lg);
            border: 1px solid var(--color-border);
            animation: slideUp 0.6s ease 0.2s backwards;
        }
        
        .question-number {
            color: var(--color-accent);
            font-size: var(--font-size-small);
            font-weight: var(--font-weight-bold);
            margin-bottom: 8px;
        }
        
        .question-text {
            font-size: var(--font-size-card-title);
            font-weight: var(--font-weight-bold);
            margin-bottom: var(--spacing-lg);
            color: var(--color-white);
        }
        
        .options {
            display: flex;
            flex-direction: column;
            gap: var(--spacing-md);
        }
        
        .option {
            background: var(--color-bg);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-md);
            padding: var(--spacing-lg);
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: left;
        }
        
        .option:hover {
            border-color: var(--color-accent);
            transform: translateY(-2px);
        }
        
        .option.selected {
            border-color: var(--color-accent);
            background: rgba(74, 222, 128, 0.1);
        }
        
        .option-label {
            font-size: var(--font-size-card-title);
            font-weight: 500;
            color: var(--color-white);
        }
        
        .button {
            width: 100%;
            background: var(--color-white);
            color: var(--color-primary);
            border: none;
            border-radius: var(--radius-md);
            padding: 14px 24px;
            font-size: var(--font-size-card-title);
            font-weight: var(--font-weight-bold);
            cursor: pointer;
            transition: all 0.2s ease;
            margin-top: var(--spacing-lg);
        }
        
        .button:hover {
            background: #f5f5f5;
            transform: translateY(-1px);
        }
        
        .button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        
        .result {
            display: none;
        }
        
        .result.active {
            display: block;
            animation: fadeIn 0.6s ease;
        }
        
        .result-card {
            background: var(--color-card);
            border-radius: var(--radius-md);
            padding: 24px;
            margin-bottom: var(--spacing-lg);
            border: 1px solid var(--color-border);
            text-align: center;
        }
        
        .result-emoji {
            font-size: 80px;
            margin-bottom: 16px;
            animation: heartbeat 1.5s ease infinite;
        }
        
        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            25% { transform: scale(1.1); }
            50% { transform: scale(1); }
        }
        
        .result-type {
            font-size: 28px;
            font-weight: var(--font-weight-bold);
            margin-bottom: 8px;
            color: var(--color-accent);
        }
        
        .result-subtitle {
            font-size: var(--font-size-card-title);
            color: var(--color-white);
            margin-bottom: 16px;
            font-weight: 500;
        }
        
        .result-desc {
            font-size: 14px;
            line-height: 1.8;
            color: var(--color-white);
            margin-bottom: 16px;
            text-align: left;
        }
        
        .result-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            margin-top: 16px;
        }
        
        .tag {
            background: #1a1a1a;
            color: var(--color-accent);
            padding: 6px 14px;
            border-radius: 9999px;
            font-size: var(--font-size-small);
            font-weight: 500;
        }
        
        .traits {
            display: grid;
            gap: var(--spacing-md);
            margin-bottom: var(--spacing-lg);
        }
        
        .trait-item {
            background: var(--color-card);
            border-radius: var(--radius-md);
            padding: var(--spacing-lg);
            border: 1px solid var(--color-border);
        }
        
        .trait-title {
            font-size: var(--font-size-card-title);
            font-weight: var(--font-weight-bold);
            margin-bottom: 8px;
            color: var(--color-white);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .trait-value {
            font-size: var(--font-size-small);
            color: var(--color-gray-light);
            line-height: 1.6;
        }
        
        .share-buttons {
            display: flex;
            gap: var(--spacing-md);
            margin-top: var(--spacing-lg);
        }
        
        .share-button {
            flex: 1;
            background: var(--color-card);
            color: var(--color-white);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-md);
            padding: 12px;
            font-size: var(--font-size-small);
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        
        .share-button:hover {
            background: #1a1a1a;
            border-color: #333;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="quiz" class="quiz">
            <div class="header">
                <h1>测测你的恋爱风格</h1>
                <p>12道题找到你的爱情类型</p>
            </div>
            
            <div class="progress-bar">
                <div class="progress-fill" id="progress"></div>
            </div>
            
            <div id="questionContainer"></div>
            
            <button class="button" id="nextBtn" onclick="nextQuestion()" disabled>
                下一题
            </button>
        </div>
        
        <div id="result" class="result">
            <div class="header">
                <h1>你的恋爱风格</h1>
                <p>基于情感模式分析</p>
            </div>
            
            <div class="result-card">
                <div class="result-emoji" id="resultEmoji"></div>
                <div class="result-type" id="resultType"></div>
                <div class="result-subtitle" id="resultSubtitle"></div>
                <div class="result-desc" id="resultDesc"></div>
                <div class="result-tags" id="resultTags"></div>
            </div>
            
            <div class="traits" id="traits"></div>
            
            <div class="share-buttons">
                <button class="share-button" onclick="shareResult()">
                    📤 分享结果
                </button>
                <button class="share-button" onclick="restart()">
                    🔄 重新测试
                </button>
            </div>
        </div>
    </div>

                name: "安全稳定型",
                subtitle: "踏实可靠的建设者",
                desc: "你是追求安全感和稳定的恋爱者，重视承诺和未来规划。你踏实、认真、负责任，把爱情当作人生大事。在爱情中你可靠、忠诚、为对方着想，是最值得托付终身的人。你不追求激情，更看重长久和稳定。你的踏实让爱情充满安全感和归属感。",
                tags: ["安全", "稳定", "踏实", "忠诚", "负责"],
                traits: [
                    { icon: "💕", title: "恋爱特点", value: "追求稳定、认真负责、忠诚专一、重视承诺、规划未来" },
                    { icon: "💑", title: "适合对象", value: "同样稳定、有规划、认真对待、可靠负责、长期主义" },
                    { icon: "⚠️", title: "注意事项", value: "增加浪漫和惊喜、不要过于保守、接受变化、适当冒险" }
                ]
            }
        };
        
        let currentQuestion = 0;
        let typeScores = {
            romantic: 0, passionate: 0, companion: 0, emotional: 0,
            rational: 0, independent: 0, adventurous: 0, secure: 0
        };
        
        function renderQuestion() {
            const question = questions[currentQuestion];
            const container = document.getElementById('questionContainer');
            
            container.innerHTML = `
                <div class="question-card">
                    <div class="question-number">问题 ${currentQuestion + 1}/12</div>
                    <div class="question-text">${question.question}</div>
                    <div class="options">
                        ${question.options.map((option, index) => `
                            <div class="option" onclick="selectOption(${index})">
                                <div class="option-label">${option.text}</div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
            
            const progress = ((currentQuestion) / questions.length) * 100;
            document.getElementById('progress').style.width = progress + '%';
            document.getElementById('nextBtn').disabled = true;
        }
        
        function selectOption(index) {
            document.querySelectorAll('.option').forEach(opt => {
                opt.classList.remove('selected');
            });
            
            document.querySelectorAll('.option')[index].classList.add('selected');
            
            const option = questions[currentQuestion].options[index];
            typeScores[option.type] += option.score;
            
            document.getElementById('nextBtn').disabled = false;
        }
        
        function nextQuestion() {
            if (currentQuestion < questions.length - 1) {
                currentQuestion++;
                renderQuestion();
            } else {
                showResult();
            }
        }
        
        function calculateType() {
            let maxScore = 0;
            let resultType = 'romantic';
            
            for (let type in typeScores) {
                if (typeScores[type] > maxScore) {
                    maxScore = typeScores[type];
                    resultType = type;
                }
            }
            
            return resultType;
        }
        
        function showResult() {
            const type = calculateType();
            const result = loveResults[type];
            
            document.getElementById('quiz').classList.add('hidden');
            document.getElementById('result').classList.add('active');
            
            document.getElementById('resultEmoji').textContent = result.emoji;
            document.getElementById('resultType').textContent = result.name;
            document.getElementById('resultSubtitle').textContent = result.subtitle;
            document.getElementById('resultDesc').textContent = result.desc;
            
            const tagsHtml = result.tags.map(tag => `<span class="tag">${tag}</span>`).join('');
            document.getElementById('resultTags').innerHTML = tagsHtml;
            
            const traitsHtml = result.traits.map(trait => `
                <div class="trait-item">
                    <div class="trait-title">
                        <span>${trait.icon}</span>
                        <span>${trait.title}</span>
                    </div>
                    <div class="trait-value">${trait.value}</div>
                </div>
            `).join('');
            document.getElementById('traits').innerHTML = traitsHtml;
        }
        
        function shareResult() {
            const type = calculateType();
            const result = loveResults[type];
            const text = `我的恋爱风格是${result.name}！${result.subtitle}，你也来测测看吧~`;
            
            if (navigator.share) {
                navigator.share({
                    title: '恋爱风格测试',
                    text: text,
                    url: window.location.href
                });
            } else {
                alert('分享内容：' + text);
            }
        }
        
        function restart() {
            currentQuestion = 0;
            typeScores = {
                romantic: 0, passionate: 0, companion: 0, emotional: 0,
                rational: 0, independent: 0, adventurous: 0, secure: 0
            };
            document.getElementById('quiz').classList.remove('hidden');
            document.getElementById('result').classList.remove('active');
            renderQuestion();
        }
        
        renderQuestion();
    </script>
</body>
</html>
