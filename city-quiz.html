<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>测测你的理想生活城市 | 趣味测试</title>
    <style>
        /* CSS变量 - 设计规范 */
        :root {
            --color-primary: #000;
            --color-text: #111;
            --color-accent: #4ade80;
            --color-bg: #000;
            --color-card: #111;
            --color-border: #222;
            --color-white: #fff;
            --color-gray-light: #666;
            
            --font-size-h2: 24px;
            --font-size-card-title: 15px;
            --font-size-small: 12px;
            --font-weight-bold: 600;
            
            --max-width-mobile: 420px;
            --spacing-md: 12px;
            --spacing-lg: 16px;
            --radius-md: 12px;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            background: var(--color-bg);
            color: var(--color-white);
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
            min-height: 100vh;
            padding: var(--spacing-lg);
        }
        
        .container {
            max-width: var(--max-width-mobile);
            margin: 0 auto;
        }
        
        /* 头部 */
        .header {
            text-align: center;
            margin-bottom: 32px;
            animation: slideUp 0.6s ease;
        }
        
        .header h1 {
            font-size: var(--font-size-h2);
            font-weight: var(--font-weight-bold);
            margin-bottom: 8px;
            color: var(--color-white);
        }
        
        .header p {
            font-size: var(--font-size-small);
            color: var(--color-gray-light);
        }
        
        /* 进度条 */
        .progress-bar {
            background: var(--color-card);
            height: 4px;
            border-radius: 9999px;
            margin-bottom: 24px;
            overflow: hidden;
            animation: slideUp 0.6s ease 0.1s backwards;
        }
        
        .progress-fill {
            height: 100%;
            background: var(--color-accent);
            transition: width 0.3s ease;
        }
        
        /* 问题卡片 */
        .question-card {
            background: var(--color-card);
            border-radius: var(--radius-md);
            padding: var(--spacing-lg);
            margin-bottom: var(--spacing-lg);
            border: 1px solid var(--color-border);
            animation: slideUp 0.6s ease 0.2s backwards;
        }
        
        .question-number {
            color: var(--color-accent);
            font-size: var(--font-size-small);
            font-weight: var(--font-weight-bold);
            margin-bottom: 8px;
        }
        
        .question-text {
            font-size: var(--font-size-card-title);
            font-weight: var(--font-weight-bold);
            margin-bottom: var(--spacing-lg);
            color: var(--color-white);
        }
        
        /* 选项 */
        .options {
            display: flex;
            flex-direction: column;
            gap: var(--spacing-md);
        }
        
        .option {
            background: var(--color-bg);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-md);
            padding: var(--spacing-lg);
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: left;
        }
        
        .option:hover {
            border-color: var(--color-accent);
            transform: translateY(-2px);
        }
        
        .option.selected {
            border-color: var(--color-accent);
            background: rgba(74, 222, 128, 0.1);
        }
        
        .option-label {
            font-size: var(--font-size-card-title);
            font-weight: 500;
            color: var(--color-white);
            margin-bottom: 4px;
        }
        
        .option-desc {
            font-size: var(--font-size-small);
            color: var(--color-gray-light);
        }
        
        /* 按钮 */
        .button {
            width: 100%;
            background: var(--color-white);
            color: var(--color-primary);
            border: none;
            border-radius: var(--radius-md);
            padding: 14px 24px;
            font-size: var(--font-size-card-title);
            font-weight: var(--font-weight-bold);
            cursor: pointer;
            transition: all 0.2s ease;
            margin-top: var(--spacing-lg);
        }
        
        .button:hover {
            background: #f5f5f5;
            transform: translateY(-1px);
        }
        
        .button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        
        /* 结果页面 */
        .result {
            display: none;
        }
        
        .result.active {
            display: block;
            animation: fadeIn 0.6s ease;
        }
        
        .result-card {
            background: var(--color-card);
            border-radius: var(--radius-md);
            padding: 24px;
            margin-bottom: var(--spacing-lg);
            border: 1px solid var(--color-border);
            text-align: center;
        }
        
        .result-emoji {
            font-size: 64px;
            margin-bottom: 16px;
        }
        
        .result-city {
            font-size: 28px;
            font-weight: var(--font-weight-bold);
            margin-bottom: 8px;
            color: var(--color-accent);
        }
        
        .result-subtitle {
            font-size: var(--font-size-small);
            color: var(--color-gray-light);
            margin-bottom: 16px;
        }
        
        .result-desc {
            font-size: 14px;
            line-height: 1.8;
            color: var(--color-white);
            margin-bottom: 16px;
        }
        
        .result-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            margin-top: 16px;
        }
        
        .tag {
            background: #1a1a1a;
            color: var(--color-accent);
            padding: 6px 14px;
            border-radius: 9999px;
            font-size: var(--font-size-small);
            font-weight: 500;
        }
        
        /* 特质卡片 */
        .traits {
            display: grid;
            gap: var(--spacing-md);
            margin-bottom: var(--spacing-lg);
        }
        
        .trait-item {
            background: var(--color-card);
            border-radius: var(--radius-md);
            padding: var(--spacing-lg);
            border: 1px solid var(--color-border);
        }
        
        .trait-title {
            font-size: var(--font-size-card-title);
            font-weight: var(--font-weight-bold);
            margin-bottom: 8px;
            color: var(--color-white);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .trait-value {
            font-size: var(--font-size-small);
            color: var(--color-gray-light);
            line-height: 1.6;
        }
        
        /* 分享按钮 */
        .share-buttons {
            display: flex;
            gap: var(--spacing-md);
            margin-top: var(--spacing-lg);
        }
        
        .share-button {
            flex: 1;
            background: var(--color-card);
            color: var(--color-white);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-md);
            padding: 12px;
            font-size: var(--font-size-small);
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        
        .share-button:hover {
            background: #1a1a1a;
            border-color: #333;
        }
        
        /* 动画 */
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        /* 隐藏类 */
        .hidden {
            display: none;
        }
    </style>
</head>

                            <div class="option" onclick="selectOption(${index})">
                                <div class="option-label">${option.text}</div>
                                <div class="option-desc">${option.desc}</div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
            
            // 更新进度条
            const progress = ((currentQuestion) / questions.length) * 100;
            document.getElementById('progress').style.width = progress + '%';
            
            // 禁用下一题按钮
            document.getElementById('nextBtn').disabled = true;
        }
        
        // 选择选项
        function selectOption(index) {
            // 移除之前的选中状态
            document.querySelectorAll('.option').forEach(opt => {
                opt.classList.remove('selected');
            });
            
            // 添加选中状态
            document.querySelectorAll('.option')[index].classList.add('selected');
            
            // 保存答案
            answers[currentQuestion] = questions[currentQuestion].options[index].value;
            
            // 启用下一题按钮
            document.getElementById('nextBtn').disabled = false;
        }
        
        // 下一题
        function nextQuestion() {
            if (currentQuestion < questions.length - 1) {
                currentQuestion++;
                renderQuestion();
            } else {
                showResult();
            }
        }
        
        // 计算结果
        function calculateResult() {
            const scores = {
                shanghai: 0,
                beijing: 0,
                chengdu: 0,
                hangzhou: 0,
                shenzhen: 0,
                suzhou: 0,
                xiamen: 0,
                kunming: 0
            };
            
            // 根据答案计算得分
            answers.forEach((answer, index) => {
                switch(answer) {
                    case 'culture':
                        scores.beijing += 3;
                        scores.suzhou += 2;
                        break;
                    case 'nature':
                        scores.hangzhou += 3;
                        scores.kunming += 2;
                        scores.xiamen += 2;
                        break;
                    case 'modern':
                        scores.shanghai += 3;
                        scores.shenzhen += 2;
                        break;
                    case 'quiet':
                        scores.suzhou += 2;
                        scores.chengdu += 2;
                        break;
                    case 'fast':
                        scores.shanghai += 3;
                        scores.shenzhen += 3;
                        break;
                    case 'balanced':
                        scores.hangzhou += 3;
                        scores.chengdu += 2;
                        break;
                    case 'slow':
                        scores.chengdu += 3;
                        scores.xiamen += 2;
                        scores.kunming += 2;
                        break;
                    case 'career':
                        scores.shanghai += 3;
                        scores.beijing += 2;
                        scores.shenzhen += 2;
                        break;
                    case 'cost':
                        scores.chengdu += 3;
                        scores.suzhou += 2;
                        break;
                    case 'climate':
                        scores.kunming += 3;
                        scores.xiamen += 2;
                        scores.shenzhen += 2;
                        break;
                    case 'spicy':
                        scores.chengdu += 3;
                        break;
                    case 'light':
                        scores.suzhou += 3;
                        scores.hangzhou += 2;
                        break;
                    case 'seafood':
                        scores.xiamen += 3;
                        scores.shenzhen += 2;
                        break;
                    case 'mega':
                        scores.shanghai += 3;
                        scores.beijing += 2;
                        break;
                    case 'large':
                        scores.hangzhou += 3;
                        scores.chengdu += 2;
                        scores.shenzhen += 2;
                        break;
                    case 'medium':
                        scores.suzhou += 3;
                        scores.xiamen += 2;
                        break;
                    case 'small':
                        scores.kunming += 3;
                        break;
                    case 'history':
                        scores.beijing += 3;
                        scores.suzhou += 2;
                        break;
                    case 'art':
                        scores.hangzhou += 2;
                        scores.xiamen += 2;
                        break;
                    case 'spring':
                        scores.kunming += 3;
                        scores.xiamen += 2;
                        break;
                }
            });
            
            // 找出得分最高的城市
            let maxScore = 0;
            let resultCity = 'shanghai';
            
            for (let city in scores) {
                if (scores[city] > maxScore) {
                    maxScore = scores[city];
                    resultCity = city;
                }
            }
            
            return resultCity;
        }
        
        // 显示结果
        function showResult() {
            const resultCity = calculateResult();
            const result = cityResults[resultCity];
            
            // 隐藏测试，显示结果
            document.getElementById('quiz').classList.add('hidden');
            document.getElementById('result').classList.add('active');
            
            // 渲染结果
            document.getElementById('resultEmoji').textContent = result.emoji;
            document.getElementById('resultCity').textContent = result.name;
            document.getElementById('resultSubtitle').textContent = result.subtitle;
            document.getElementById('resultDesc').textContent = result.desc;
            
            // 渲染标签
            const tagsHtml = result.tags.map(tag => `<span class="tag">${tag}</span>`).join('');
            document.getElementById('resultTags').innerHTML = tagsHtml;
            
            // 渲染特质
            const traitsHtml = result.traits.map(trait => `
                <div class="trait-item">
                    <div class="trait-title">
                        <span>${trait.icon}</span>
                        <span>${trait.title}</span>
                    </div>
                    <div class="trait-value">${trait.value}</div>
                </div>
            `).join('');
            document.getElementById('traits').innerHTML = traitsHtml;
        }
        
        // 分享结果
        function shareResult() {
            const resultCity = document.getElementById('resultCity').textContent;
            const text = `我测出来最适合生活的城市是${resultCity}！你也来测测看吧~`;
            
            if (navigator.share) {
                navigator.share({
                    title: '理想生活城市测试',
                    text: text,
                    url: window.location.href
                });
            } else {
                alert('分享功能：' + text);
            }
        }
        
        // 重新测试
        function restart() {
            currentQuestion = 0;
            answers = [];
            document.getElementById('quiz').classList.remove('hidden');
            document.getElementById('result').classList.remove('active');
            renderQuestion();
        }
        
        // 初始化
        renderQuestion();
    </script>
</body>
</html>
