        :root {

            --color-border: #222;
            --color-white: #fff;
            --color-gray-light: #666;

            --font-size-card-title: 15px;
            --font-size-small: 12px;
            --font-weight-bold: 600;

            --spacing-md: 12px;

            --radius-md: 12px;
        }

            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;

            color: var(--color-white);
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
            min-height: 100vh;
            padding: var(--spacing-lg);
        }
        
        .container {
            max-width: var(--max-width-mobile);
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            margin-bottom: 32px;
            animation: slideUp 0.6s ease;
        }
        
        .header h1 {
            font-size: var(--font-size-h2);
            font-weight: var(--font-weight-bold);
            margin-bottom: 8px;
            color: var(--color-white);
        }
        
        .header p {
            font-size: var(--font-size-small);
            color: var(--color-gray-light);
        }
        
        .progress-bar {
            background: var(--color-card);
            height: 4px;
            border-radius: 9999px;
            margin-bottom: 24px;
            overflow: hidden;
            animation: slideUp 0.6s ease 0.1s backwards;
        }
        
        .progress-fill {
            height: 100%;
            background: var(--color-accent);
            transition: width 0.3s ease;
        }
        
        .question-card {
            background: var(--color-card);
            border-radius: var(--radius-md);
            padding: var(--spacing-lg);
            margin-bottom: var(--spacing-lg);
            border: 1px solid var(--color-border);
            animation: slideUp 0.6s ease 0.2s backwards;
        }
        
        .question-number {
            color: var(--color-accent);
            font-size: var(--font-size-small);
            font-weight: var(--font-weight-bold);
            margin-bottom: 8px;
        }
        
        .question-text {
            font-size: var(--font-size-card-title);
            font-weight: var(--font-weight-bold);
            margin-bottom: var(--spacing-lg);
            color: var(--color-white);
        }
        
        .options {
            display: flex;
            flex-direction: column;
            gap: var(--spacing-md);
        }
        
        .option {
            background: var(--color-bg);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-md);
            padding: var(--spacing-lg);
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: left;
        }
        
        .option:hover {
            border-color: var(--color-accent);
            transform: translateY(-2px);
        }
        
        .option.selected {
            border-color: var(--color-accent);
            background: rgba(74, 222, 128, 0.1);
        }
        
        .option-label {
            font-size: var(--font-size-card-title);
            font-weight: 500;
            color: var(--color-white);
        }
        
        .button {
            width: 100%;
            background: var(--color-white);
            color: var(--color-primary);
            border: none;
            border-radius: var(--radius-md);
            padding: 14px 24px;
            font-size: var(--font-size-card-title);
            font-weight: var(--font-weight-bold);
            cursor: pointer;
            transition: all 0.2s ease;
            margin-top: var(--spacing-lg);
        }
        
        .button:hover {
            background: #f5f5f5;
            transform: translateY(-1px);
        }
        
        .button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        
        .result {
            display: none;
        }
        
        .result.active {
            display: block;
            animation: fadeIn 0.6s ease;
        }
        
        .result-card {
            background: var(--color-card);
            border-radius: var(--radius-md);
            padding: 24px;
            margin-bottom: var(--spacing-lg);
            border: 1px solid var(--color-border);
            text-align: center;
        }
        
        .result-emoji {
            font-size: 80px;
            margin-bottom: 16px;
            animation: bounce 1s ease;
        }
        
        @keyframes bounce {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
        
        .result-type {
            font-size: 28px;
            font-weight: var(--font-weight-bold);
            margin-bottom: 8px;
            color: var(--color-accent);
        }
        
        .result-subtitle {
            font-size: var(--font-size-card-title);
            color: var(--color-white);
            margin-bottom: 16px;
            font-weight: 500;
        }
        
        .result-desc {
            font-size: 14px;
            line-height: 1.8;
            color: var(--color-white);
            margin-bottom: 16px;
            text-align: left;
        }
        
        .result-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            margin-top: 16px;
        }
        
        .tag {
            background: #1a1a1a;
            color: var(--color-accent);
            padding: 6px 14px;
            border-radius: 9999px;
            font-size: var(--font-size-small);
            font-weight: 500;
        }
        
        .traits {
            display: grid;
            gap: var(--spacing-md);
            margin-bottom: var(--spacing-lg);
        }
        
        .trait-item {
            background: var(--color-card);
            border-radius: var(--radius-md);
            padding: var(--spacing-lg);
            border: 1px solid var(--color-border);
        }
        
        .trait-title {
            font-size: var(--font-size-card-title);
            font-weight: var(--font-weight-bold);
            margin-bottom: 8px;
            color: var(--color-white);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .trait-value {
            font-size: var(--font-size-small);
            color: var(--color-gray-light);
            line-height: 1.6;
        }
        
        .share-buttons {
            display: flex;
            gap: var(--spacing-md);
            margin-top: var(--spacing-lg);
        }
        
        .share-button {
            flex: 1;
            background: var(--color-card);
            color: var(--color-white);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-md);
            padding: 12px;
            font-size: var(--font-size-small);
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        
        .share-button:hover {
            background: #1a1a1a;
            border-color: #333;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .hidden {
            display: none;
        }
    </style>
</head>

            <div class="traits" id="traits"></div>

                <button class="share-button" onclick="restart()">

                tags: ["自由", "创意", "灵动", "好奇", "美好"],
                traits: [
                    { icon: "💪", title: "核心优势", value: "创造力强、充满活力、好奇心、发现美好、适应变化" },
                    { icon: "🎯", title: "适合场景", value: "创意产业、艺术设计、旅游、需要创新的领域" },
                    { icon: "⚠️", title: "成长建议", value: "提高专注力、培养耐心、坚持长期目标、增强稳定性" }
                ]
            },
            panda: {
                emoji: "🐼",
                name: "熊猫型",
                subtitle: "悠闲的享受者",
                desc: "你是慢节奏的享受派，拥有平和的心态和淡定的性格。不急不躁，享受生活，懂得放松。你不喜欢竞争和压力，更倾向于舒适和稳定。虽然看似懒散，但你有自己的节奏和智慧。你的平和与淡定是现代社会稀缺的品质。",
                tags: ["平和", "悠闲", "淡定", "享受", "可爱"],
                traits: [
                    { icon: "💪", title: "核心优势", value: "心态平和、不急不躁、享受生活、减压能力强、与世无争" },
                    { icon: "🎯", title: "适合场景", value: "稳定工作、生活方式相关、治愈系领域、低压力环境" },
                    { icon: "⚠️", title: "成长建议", value: "提高积极性、增强竞争意识、适当走出舒适区、设定目标" }
                ]
            }
        };
        
        let currentQuestion = 0;
        let animalScores = {
            lion: 0, owl: 0, dolphin: 0, fox: 0, bee: 0,
            wolf: 0, cheetah: 0, cat: 0, butterfly: 0, panda: 0
        };
        
        function renderQuestion() {
            const question = questions[currentQuestion];
            const container = document.getElementById('questionContainer');
            
            container.innerHTML = `
                <div class="question-card">
                    <div class="question-number">问题 ${currentQuestion + 1}/10</div>
                    <div class="question-text">${question.question}</div>
                    <div class="options">
                        ${question.options.map((option, index) => `
                            <div class="option" onclick="selectOption(${index})">
                                <div class="option-label">${option.text}</div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
            
            const progress = ((currentQuestion) / questions.length) * 100;
            document.getElementById('progress').style.width = progress + '%';
            document.getElementById('nextBtn').disabled = true;
        }
        
        function selectOption(index) {
            document.querySelectorAll('.option').forEach(opt => {
                opt.classList.remove('selected');
            });
            
            document.querySelectorAll('.option')[index].classList.add('selected');
            
            const option = questions[currentQuestion].options[index];
            animalScores[option.animal] += option.score;
            
            document.getElementById('nextBtn').disabled = false;
        }
        
        function nextQuestion() {
            if (currentQuestion < questions.length - 1) {
                currentQuestion++;
                renderQuestion();
            } else {
                showResult();
            }
        }
        
        function calculateAnimal() {
            let maxScore = 0;
            let resultAnimal = 'lion';
            
            for (let animal in animalScores) {
                if (animalScores[animal] > maxScore) {
                    maxScore = animalScores[animal];
                    resultAnimal = animal;
                }
            }
            
            return resultAnimal;
        }
        
        function showResult() {
            const animal = calculateAnimal();
            const result = animalResults[animal];
            
            document.getElementById('quiz').classList.add('hidden');
            document.getElementById('result').classList.add('active');
            
            document.getElementById('resultEmoji').textContent = result.emoji;
            document.getElementById('resultType').textContent = result.name;
            document.getElementById('resultSubtitle').textContent = result.subtitle;
            document.getElementById('resultDesc').textContent = result.desc;
            
            const tagsHtml = result.tags.map(tag => `<span class="tag">${tag}</span>`).join('');
            document.getElementById('resultTags').innerHTML = tagsHtml;
            
            const traitsHtml = result.traits.map(trait => `
                <div class="trait-item">
                    <div class="trait-title">
                        <span>${trait.icon}</span>
                        <span>${trait.title}</span>
                    </div>
                    <div class="trait-value">${trait.value}</div>
                </div>
            `).join('');
            document.getElementById('traits').innerHTML = traitsHtml;
        }
        
        function shareResult() {
            const animal = calculateAnimal();
            const result = animalResults[animal];
            const text = `我的动物属性是${result.name}！${result.subtitle}，你也来测测看吧~`;
            
            if (navigator.share) {
                navigator.share({
                    title: '动物属性测试',
                    text: text,
                    url: window.location.href
                });
            } else {
                alert('分享内容：' + text);
            }
        }
        
        function restart() {
            currentQuestion = 0;
            animalScores = {
                lion: 0, owl: 0, dolphin: 0, fox: 0, bee: 0,
                wolf: 0, cheetah: 0, cat: 0, butterfly: 0, panda: 0
            };
            document.getElementById('quiz').classList.remove('hidden');
            document.getElementById('result').classList.remove('active');
            renderQuestion();
        }
        
        renderQuestion();
    </script>
</body>
</html>
